name: CI

on: [push]

env:
  CI: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-2025-vs2026
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: pnpm
      # The inkdrop-keyboard-layout native addon links against X11 + xkbfile, and
      # the Electron renderer tests need a virtual display on Linux.
      - name: Install X11 libraries (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbfile-dev xvfb
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Electron 42 removed the postinstall that used to fetch the binary at
      # install time (supply-chain hardening); it now downloads lazily on first
      # require(), which electron-mocha's parent + renderer then race on. Electron's
      # own install.js doesn't complete the download in CI, so this pre-downloads
      # it reliably (see the script for details).
      - name: Download Electron binary
        run: node script/download-electron.mjs
      # Chromium's SUID sandbox requires chrome-sandbox to be owned by root with
      # mode 4755. Extracting Electron as the runner user doesn't set that, so
      # Electron aborts on Linux. (Ubuntu 24.04 restricts unprivileged user
      # namespaces, so Chromium falls back to this SUID sandbox.)
      - name: Configure Electron SUID sandbox (Linux)
        if: runner.os == 'Linux'
        run: |
          sandbox="$(node -p "require('node:path').join(require('node:path').dirname(require.resolve('electron/package.json')), 'dist', 'chrome-sandbox')")"
          sudo chown root:root "$sandbox"
          sudo chmod 4755 "$sandbox"
      - name: Lint
        run: pnpm run lint
      # Linux needs a virtual X display for the Electron renderer; other platforms
      # run the tests directly.
      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum pnpm test
      - name: Run tests
        if: runner.os != 'Linux'
        run: pnpm test
