name: CI

on: [push]

env:
  CI: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-2025-vs2026
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          # Node 24 has an event-loop regression that makes Electron's lazy
          # binary download (extract step) bail with an unsettled top-level
          # await; Node 26 downloads it correctly.
          node-version: "26"
          cache: pnpm
      # The inkdrop-keyboard-layout native addon links against X11 + xkbfile, and
      # the Electron renderer tests need a virtual display on Linux.
      - name: Install X11 libraries (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbfile-dev xvfb
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Electron 42 removed the postinstall that used to fetch the binary at
      # install time (supply-chain hardening); it now downloads lazily on first
      # require(). Pre-download it once here so electron-mocha's parent + renderer
      # don't both trigger the download at test time and race on it.
      - name: Download Electron binary
        run: node node_modules/electron/install.js
      - name: Lint
        run: pnpm run lint
      # Linux needs a virtual X display for the Electron renderer; other platforms
      # run the tests directly.
      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum pnpm test
      - name: Run tests
        if: runner.os != 'Linux'
        run: pnpm test
