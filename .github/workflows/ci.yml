name: CI

on: [push]

env:
  CI: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-2025-vs2026
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
      # The inkdrop-keyboard-layout native addon links against X11 + xkbfile, and
      # the Electron renderer tests need a virtual display on Linux.
      - name: Install X11 libraries (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbfile-dev xvfb
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Electron 42 has no postinstall; its binary is fetched lazily on first
      # require(). electron/install.js fires that download off without awaiting,
      # so in CI the process exits before it finishes and `path.txt` is never
      # written — then electron-mocha's parent+renderer both retry and race.
      # This downloader awaits the fetch, so it can't exit early.
      - name: Download Electron binary
        run: node script/download-electron.mjs
      - name: Lint
        run: pnpm run lint
      # Linux needs a virtual X display for the Electron renderer; other platforms
      # run the tests directly.
      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum pnpm test
      - name: Run tests
        if: runner.os != 'Linux'
        run: pnpm test
