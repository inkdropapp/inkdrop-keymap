name: CI

on: [push]

env:
  CI: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-2025-vs2026
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      # The inkdrop-keyboard-layout native addon links against X11 + xkbfile, and
      # the Electron renderer tests need a virtual display on Linux.
      - name: Install X11 libraries (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxkbfile-dev xvfb
      - name: Install dependencies
        run: npm i
      - name: Lint
        run: npm run lint
      # Linux needs a virtual X display for the Electron renderer; other platforms
      # run the tests directly.
      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum npm test
      - name: Run tests
        if: runner.os != 'Linux'
        run: npm test
